query Characters($page: Int) {
  characters(page: $page) {
    info {
      next
    }
    results {
      id
      name
      species
    }
  }
}

query Character($id: ID!) {
  character(id: $id) {
    id
    image
    name
    species
    status
    origin {
      name
    }
    location {
      name
    }
    episode {
      id
      name
    }
  }
}
